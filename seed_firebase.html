// Render progress bars

    <div class="progress-row">
      <span class="progress-label">${LABELS[col]||col}</span>

function log(msg, type=''){
  const el = document.getElementById('log');
  const cls = type==='err'?'err':type==='info'?'info':'';
  el.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.startImport = async function(){
  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  btn.textContent = '⏳ Import en cours...';
  log('Démarrage de l\'import...', 'info');

  for(const [colName, docs] of Object.entries(DATA)){
    const pbEl = document.getElementById('pb-'+colName);
    const pcEl = document.getElementById('pc-'+colName);
    const psEl = document.getElementById('ps-'+colName);
    psEl.className = 'status-badge sb-wait';
    psEl.textContent = 'Import...';
    log(`📦 Import "${colName}" (${docs.length} documents)...`);

    try {
      let i = 0;
      const batch = [];
      for(const docData of docs){
        batch.push(addDoc(collection(db, colName), {
          ...docData,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        i++;
        pbEl.style.width = Math.round(i/docs.length*100)+'%';
        pcEl.textContent = `${i}/${docs.length}`;
      }
      await Promise.all(batch);
      psEl.className = 'status-badge sb-ok';
      psEl.textContent = '✓ OK';
      log(`✅ "${colName}" importé (${docs.length} docs)`);
    } catch(err){
      psEl.className = 'status-badge sb-err';
      psEl.textContent = '✗ Erreur';
      log(`❌ Erreur "${colName}": ${err.message}`, 'err');
    }
  }

  btn.textContent = '✅ Import terminé !';
  btn.style.background = '#059669';
  document.getElementById('btn-reset').style.display = 'block';
  log('🎉 Import terminé ! Vous pouvez fermer cette page.', 'info');
};

window.resetAll = async function(){
  if(!confirm('⚠️ Effacer TOUTES les données Firestore ? Cette action est irréversible.')) return;
  log('🗑️ Suppression de toutes les données...', 'err');
  for(const colName of Object.keys(DATA)){
    const snap = await getDocs(collection(db, colName));
    const batch = snap.docs.map(d => deleteDoc(doc(db, colName, d.id)));
    await Promise.all(batch);
    log(`🗑️ "${colName}" vidé (${snap.docs.length} docs supprimés)`);
    document.getElementById('pb-'+colName).style.width = '0%';
    document.getElementById('pc-'+colName).textContent = `0/${DATA[colName].length}`;
    document.getElementById('ps-'+colName).className = 'status-badge sb-wait';
    document.getElementById('ps-'+colName).textContent = 'Vide';
  }
  log('✅ Base de données réinitialisée', 'info');
};
